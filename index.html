<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DB Architects – Career Fair 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  width:100%;min-height:100vh;
  background:#E8E3D8;
  font-family:'Plus Jakarta Sans',sans-serif;
  -webkit-text-size-adjust:100%;
}

/* PAGE */
.page{
  width:100%;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  background:#E8E3D8;
}

/* CARD — full width on phones */
.card{
  width:100%;
  max-width:100%;
  background:#fff;
  flex:1;
}
@media(min-width:640px){
  .page{padding:36px 16px 52px;background:#ddd8cc;}
  .card{max-width:580px;flex:none;box-shadow:0 8px 48px rgba(14,35,56,.14);border:1px solid #cec7ba;}
}

/* HEADER */
.hdr{
  background:linear-gradient(150deg,#1E4E7E 0%,#0E2338 60%,#091929 100%);
  padding:22px 20px 26px;
  position:relative;overflow:hidden;
}
.hdr-grid{
  position:absolute;inset:0;pointer-events:none;
  background-image:linear-gradient(rgba(201,169,97,.13) 1px,transparent 1px),
    linear-gradient(90deg,rgba(201,169,97,.13) 1px,transparent 1px);
  background-size:48px 48px;
}
.hdr-top{
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.logo{height:46px;width:auto;object-fit:contain;}
.badge{
  background:#C9A961;color:#0E2338;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:.18em;text-transform:uppercase;
  padding:6px 10px;white-space:nowrap;line-height:1.4;flex-shrink:0;
}
.hdr-body{position:relative;z-index:2;margin-top:18px;}
.eyebrow{
  display:flex;align-items:center;gap:9px;
  font-family:'JetBrains Mono',monospace;
  font-size:9px;letter-spacing:.28em;text-transform:uppercase;
  color:#C9A961;margin-bottom:9px;
}
.eline{width:18px;height:1px;background:#C9A961;flex-shrink:0;}
.hdr-title{
  font-family:'Fjalla One',sans-serif;
  font-size:36px;line-height:1.05;color:#F4EFE6;font-weight:400;
}
@media(min-width:400px){.hdr-title{font-size:40px;}.logo{height:52px;}}
@media(min-width:640px){
  .hdr{padding:28px 34px 30px;}
  .hdr-title{font-size:44px;}.logo{height:56px;}
  .badge{font-size:10px;padding:7px 13px;letter-spacing:.2em;}
}

/* FORM BODY */
.form-body{
  padding:22px 20px 36px;
  display:flex;flex-direction:column;gap:19px;
}
@media(min-width:640px){.form-body{padding:28px 34px 40px;gap:22px;}}

/* FIELD */
.field{display:flex;flex-direction:column;gap:6px;}
.lbl{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#0E2338;
}
.req{color:#C9A961;}
.opt{color:#9AA3AD;text-transform:none;letter-spacing:.02em;font-size:10.5px;}

/* INPUTS */
input[type=text],input[type=tel],input[type=email],input[type=url],select{
  width:100%;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:16px;color:#0E2338;background:#fff;
  border:1.5px solid #D5CCBE;border-radius:0;
  padding:15px 14px;min-height:54px;
  outline:none;-webkit-appearance:none;appearance:none;
  transition:border-color .15s,box-shadow .15s;
}
input:focus,select:focus{border-color:#C9A961;box-shadow:inset 0 -2px 0 #C9A961;}
input:-webkit-autofill{
  -webkit-box-shadow:0 0 0 60px #fff inset!important;
  -webkit-text-fill-color:#0E2338!important;
}

/* MOBILE ROW */
.mob-row{
  display:flex;align-items:stretch;
  border:1.5px solid #D5CCBE;min-height:54px;
  transition:border-color .15s,box-shadow .15s;
}
.mob-row:focus-within{border-color:#C9A961;box-shadow:inset 0 -2px 0 #C9A961;}
.pfx{
  display:flex;align-items:center;padding:0 13px;
  font-family:'JetBrains Mono',monospace;font-size:15px;
  color:#52606D;border-right:1.5px solid #E5DDD0;
  background:#FAF7F1;white-space:nowrap;flex-shrink:0;
}
.mob-row input{
  border:none!important;background:transparent;flex:1;
  padding:15px 14px;font-family:'Plus Jakarta Sans',sans-serif;
  font-size:16px;color:#0E2338;outline:none;
  letter-spacing:.04em;-webkit-appearance:none;
}
.mob-row input:focus{box-shadow:none!important;}

/* SELECT */
.sel-wrap{position:relative;}
.sel-wrap select{padding-right:42px;cursor:pointer;}
.sel-arr{position:absolute;right:14px;top:50%;transform:translateY(-50%);pointer-events:none;}

/* CV */
.cv-lbl{
  display:flex;align-items:center;gap:14px;
  border:1.5px dashed #C9BCA6;background:#FBF9F4;
  padding:15px 14px;cursor:pointer;min-height:62px;
}
.cv-lbl:active{border-color:#C9A961;background:#FAF6EC;}
.cv-icon{width:36px;height:36px;background:#0E2338;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cv-text{display:flex;flex-direction:column;gap:3px;min-width:0;}
.cv-name{font-size:14px;color:#0E2338;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cv-hint{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.06em;color:#8A93A0;text-transform:uppercase;}

/* ERROR */
.err{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.04em;color:#B23A2E;display:none;padding-top:2px;}

/* SUBMIT */
.btn-sub{
  width:100%;min-height:58px;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;letter-spacing:.18em;text-transform:uppercase;
  color:#F4EFE6;background:#0E2338;
  border:none;border-radius:0;padding:16px;cursor:pointer;margin-top:4px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background .15s,color .15s;
}
.btn-sub:active{background:#C9A961;color:#0E2338;}
.btn-sub:disabled{opacity:.55;cursor:not-allowed;}

/* SPINNER */
.spin{width:18px;height:18px;flex-shrink:0;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:none;}
.btn-sub.loading .spin{display:inline-block;}
.btn-sub.loading .btn-txt{display:none;}
@keyframes sp{to{transform:rotate(360deg)}}

/* SUCCESS */
.success{display:none;flex-direction:column;align-items:center;text-align:center;padding:52px 22px 60px;}
.success.on{display:flex;}
.s-ring{width:70px;height:70px;border-radius:50%;background:#C9A961;display:flex;align-items:center;justify-content:center;margin-bottom:20px;}
.s-eye{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:#C9A961;margin-bottom:12px;}
.s-title{font-family:'Fjalla One',sans-serif;font-size:32px;line-height:1.05;color:#0E2338;margin:0 0 12px;font-weight:400;}
.s-body{font-size:15px;line-height:1.6;color:#52606D;margin:0 0 28px;max-width:320px;}
.btn-rst{font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#0E2338;background:transparent;border:1.5px solid #0E2338;padding:14px 26px;min-height:52px;cursor:pointer;}
.btn-rst:active{background:#0E2338;color:#fff;}
</style>
</head>

AAAAADVeiwEnT1+fHzh075EXzS7UQACAAAAYFeKQAAAAAAje7x1WJycXre5SQAAAACoyf8PDYMQOnQjjG0AAAAASUVORK5CYII=" alt="DB Architects Pvt. Ltd.">
      <div class="badge">Career Fair 2026</div>
    </div>
    <div class="hdr-body">
      <div class="eyebrow"><span class="eline"></span>Careers · DB Architects</div>
      <h1 class="hdr-title">Join Our Team</h1>
    </div>
  </div>

  <div class="success" id="successPanel">
    <div class="s-ring">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0E2338" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"></polyline>
      </svg>
    </div>
    <div class="s-eye">Interest Received</div>
    <h2 class="s-title" id="successName">Thank you.</h2>
    <p class="s-body">Your details are with our team. We will reach out about roles that match your profile.</p>
    <button class="btn-rst" onclick="resetForm()">Submit another response</button>
  </div>

  <div class="form-body" id="formPanel">

    <div class="field">
      <label class="lbl" for="fName">Name <span class="req">*</span></label>
      <input id="fName" type="text" autocomplete="name" placeholder="Your full name">
      <div class="err" id="errName"></div>
    </div>

    <div class="field">
      <label class="lbl" for="fMobile">Mobile number <span class="req">*</span></label>
      <div class="mob-row">
        <span class="pfx">+91</span>
        <input id="fMobile" type="tel" inputmode="numeric" maxlength="10"
               autocomplete="tel-national" placeholder="10-digit number"
               oninput="onMobileInput(this)">
      </div>
      <div class="err" id="errMobile"></div>
    </div>

    <div class="field">
      <label class="lbl" for="fEmail">Email <span class="opt">(optional)</span></label>
      <input id="fEmail" type="email" autocomplete="email" placeholder="you@email.com">
    </div>

    <div class="field">
      <label class="lbl" for="fRole">Role interested in <span class="opt">(optional)</span></label>
      <div class="sel-wrap">
        <select id="fRole">
          <option value="">Select a role</option>
          <option>Junior Architect</option>
          <option>Architect</option>
          <option>Project Architect</option>
          <option>Senior Architect</option>
          <option>Principal Architect</option>
        </select>
        <svg class="sel-arr" width="14" height="14" viewBox="0 0 24 24" fill="none"
             stroke="#52606D" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"></polyline>
        </svg>
      </div>
    </div>

    <div class="field">
      <label class="lbl" for="fPortfolio">Portfolio link <span class="opt">(optional)</span></label>
      <input id="fPortfolio" type="url" inputmode="url" placeholder="https://your-portfolio.com">
    </div>

    <div class="field">
      <div class="lbl">Attach CV <span class="opt">(optional)</span></div>
      <label class="cv-lbl" for="fCV">
        <span class="cv-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#C9A961"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
        </span>
        <span class="cv-text">
          <span class="cv-name" id="cvDisplay">Choose a file</span>
          <span class="cv-hint">PDF · DOC · DOCX · up to 10 MB</span>
        </span>
        <input id="fCV" type="file" accept=".pdf,.doc,.docx"
               style="display:none" onchange="onFile(this)">
      </label>
      <div class="err" id="errFile"></div>
    </div>

    <div class="err" id="errGeneral"></div>

    <button class="btn-sub" id="submitBtn" onclick="handleSubmit()">
      <span class="btn-txt">Submit Interest &rarr;</span>
      <span class="spin"></span>
    </button>

  </div>
</div>
</div>

<script>
// ── PASTE YOUR APPS SCRIPT WEB APP URL HERE ──────────────────
var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxwpKgXWnI0N3RaPwEK51CniBzUzqdF6V1_po0oquOWbap_y56a2iNhx5EIImr3tTrrFg/exec";
// ─────────────────────────────────────────────────────────────

var cvFile = null;

function onMobileInput(el){
  el.value=el.value.replace(/\D/g,"").slice(0,10);
  var m=el.value,err=document.getElementById("errMobile");
  if(!m){err.style.display="none";return;}
  var ok=/^[6-9]\d{9}$/.test(m);
  err.textContent=m.length<10?"Must be exactly 10 digits.":"Must start with 6, 7, 8 or 9.";
  err.style.display=ok?"none":"block";
}

function onFile(inp){
  var err=document.getElementById("errFile");
  err.style.display="none";
  var f=inp.files[0];
  if(!f){cvFile=null;document.getElementById("cvDisplay").textContent="Choose a file";return;}
  if(f.size>10*1024*1024){
    err.textContent="File too large. Max 10 MB.";err.style.display="block";
    inp.value="";cvFile=null;
    document.getElementById("cvDisplay").textContent="Choose a file";return;
  }
  cvFile=f;document.getElementById("cvDisplay").textContent=f.name;
}

function validate(){
  var ok=true;
  var name=document.getElementById("fName").value.trim();
  var mob=document.getElementById("fMobile").value.trim();
  var en=document.getElementById("errName"),em=document.getElementById("errMobile");
  if(!name){en.textContent="Please enter your name.";en.style.display="block";ok=false;}
  else{en.style.display="none";}
  if(!mob){em.textContent="Mobile number is required.";em.style.display="block";ok=false;}
  else if(!/^[6-9]\d{9}$/.test(mob)){
    em.textContent=mob.length<10?"Must be exactly 10 digits.":"Must start with 6, 7, 8 or 9.";
    em.style.display="block";ok=false;
  }else{em.style.display="none";}
  return ok;
}

function toDataUrl(f){
  return new Promise(function(res,rej){
    var r=new FileReader();
    r.onload=function(){res(r.result);};
    r.onerror=function(){rej(new Error("fail"));};
    r.readAsDataURL(f);
  });
}

function handleSubmit(){
  if(!validate())return;
  var btn=document.getElementById("submitBtn");
  var eg=document.getElementById("errGeneral");
  eg.style.display="none";
  btn.disabled=true;btn.classList.add("loading");

  var payload={
    name:document.getElementById("fName").value.trim(),
    mobile:document.getElementById("fMobile").value.trim(),
    email:document.getElementById("fEmail").value.trim(),
    role:document.getElementById("fRole").value,
    portfolio:document.getElementById("fPortfolio").value.trim(),
    cv:""
  };

  (cvFile?toDataUrl(cvFile):Promise.resolve(""))
    .then(function(d){
      payload.cv=d||"";
      var fd=new FormData();
      Object.keys(payload).forEach(function(k){fd.append(k,payload[k]);});
      return fetch(SCRIPT_URL,{method:"POST",body:fd});
    })
    .then(function(r){return r.json();})
    .then(function(data){
      if(data.ok){
        document.getElementById("successName").textContent=
          "Thank you, "+(data.name||payload.name)+".";
        document.getElementById("formPanel").style.display="none";
        var sp=document.getElementById("successPanel");
        sp.style.display="flex";sp.classList.add("on");
      }else{
        eg.textContent=(data.error)||"Something went wrong. Please try again.";
        eg.style.display="block";
        btn.disabled=false;btn.classList.remove("loading");
      }
    })
    .catch(function(){
      eg.textContent="Could not connect. Please try again.";
      eg.style.display="block";
      btn.disabled=false;btn.classList.remove("loading");
    });
}

function resetForm(){
  ["fName","fEmail","fPortfolio"].forEach(function(id){document.getElementById(id).value="";});
  document.getElementById("fMobile").value="";
  document.getElementById("fRole").value="";
  document.getElementById("fCV").value="";
  cvFile=null;document.getElementById("cvDisplay").textContent="Choose a file";
  ["errName","errMobile","errFile","errGeneral"].forEach(function(id){
    document.getElementById(id).style.display="none";
  });
  document.getElementById("formPanel").style.display="";
  var sp=document.getElementById("successPanel");
  sp.style.display="none";sp.classList.remove("on");
  document.getElementById("submitBtn").disabled=false;
  document.getElementById("submitBtn").classList.remove("loading");
}
</script>
</body>
</html>
